# Build and Release

name: Build

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          npm install
          cd python-workers
          pip install -r requirements.txt

      - name: Build frontend
        run: npm run build
        
      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libglib2.0-dev libgobject-2.0-dev pkg-config

      - name: Install Windows system dependencies
        if: matrix.platform == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          install: >-
            mingw-w64-x86_64-gtk3
            mingw-w64-x86_64-glib2
            mingw-w64-x86_64-toolchain

      - name: Install Mac system dependencies
        if: matrix.platform == 'macos-latest'
        run: brew install gtk+3 pkg-config

      - name: Build Rust backend
        run: |
          cd src-tauri
          cargo build --release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: semantic-file-finder-${{ matrix.platform }}
          path: src-tauri/target/release/

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            semantic-file-finder-macos-latest/*
            semantic-file-finder-ubuntu-latest/*
            semantic-file-finder-windows-latest/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
